<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排班管理 - 惟翎</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 900: '#064e3b' }
          }
        }
      }
    }
  </script>
  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .transition-transform { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden select-none">

  <!-- 1. 顶部导航 -->
  <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 z-10">
    <div class="flex items-center space-x-3">
      <div class="w-9 h-9 bg-brand-50 rounded-lg flex items-center justify-center text-brand-600">
        <i class="fa-regular fa-calendar-days text-lg"></i>
      </div>
      <div><h1 class="text-xl font-bold text-slate-800">排班与诊室分配</h1></div>
    </div>
    <div class="flex items-center space-x-3">
      <button class="px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-lg hover:bg-slate-50 hover:text-brand-600 transition-colors text-sm font-medium flex items-center shadow-sm">
        <i class="fa-solid fa-sliders mr-2"></i> 排班设置
      </button>
    </div>
  </header>

  <!-- 2. 日期导航条 (14天) -->
  <nav class="bg-white border-b border-slate-200 px-6 py-3 shrink-0 z-10">
    <div id="date-strip" class="flex space-x-2 overflow-x-auto hide-scrollbar"></div>
  </nav>

  <!-- 3. 主体：只读详情看板 -->
  <main class="flex-1 overflow-hidden flex flex-col p-6 relative">
    <div class="flex justify-between items-center mb-4 shrink-0">
      <div class="flex items-center space-x-3">
        <h2 id="main-title" class="text-xl font-bold text-slate-800">10月24日 排班详情</h2>
        <span id="main-status" class="px-2.5 py-1 bg-green-100 text-green-700 rounded text-xs font-bold">已排班</span>
      </div>
      <button onclick="openEditDrawer()" class="px-5 py-2 bg-brand-500 text-white rounded-lg hover:bg-brand-600 transition-colors text-sm font-medium shadow-md shadow-brand-500/20 flex items-center">
        <i class="fa-solid fa-pen-to-square mr-2"></i> 编辑排班
      </button>
    </div>

    <div class="flex-1 flex space-x-6 overflow-hidden">
      <!-- 左侧：上下午均分 (列表式展示) -->
      <div class="w-1/3 flex flex-col space-y-4">
        <!-- 上午班 -->
        <div class="flex-1 bg-white rounded-2xl border border-slate-200 shadow-sm p-5 flex flex-col overflow-hidden">
          <div class="flex justify-between items-center mb-4 shrink-0 border-b border-slate-100 pb-3">
            <span class="font-bold text-slate-700 flex items-center"><i class="fa-regular fa-sun text-amber-500 mr-2"></i>上午班</span>
            <span class="text-xs text-slate-400 font-medium">08:00-12:00</span>
          </div>
          <div id="main-am-list" class="flex-1 overflow-y-auto hide-scrollbar space-y-2"></div>
        </div>
        <!-- 下午班 -->
        <div class="flex-1 bg-white rounded-2xl border border-slate-200 shadow-sm p-5 flex flex-col overflow-hidden">
          <div class="flex justify-between items-center mb-4 shrink-0 border-b border-slate-100 pb-3">
            <span class="font-bold text-slate-700 flex items-center"><i class="fa-solid fa-cloud-sun text-orange-400 mr-2"></i>下午班</span>
            <span class="text-xs text-slate-400 font-medium">13:00-17:00</span>
          </div>
          <div id="main-pm-list" class="flex-1 overflow-y-auto hide-scrollbar space-y-2"></div>
        </div>
      </div>

      <!-- 右侧：号源时间轴 (只读) -->
      <div class="w-2/3 bg-white rounded-2xl border border-slate-200 shadow-sm p-6 flex flex-col overflow-hidden">
        <div class="flex justify-between items-center mb-6 shrink-0">
          <h4 class="font-bold text-slate-700 flex items-center"><i class="fa-solid fa-timeline text-brand-500 mr-2"></i>医生/视光师 号源时间轴</h4>
          <span class="text-xs text-slate-400">只读模式</span>
        </div>
        <div id="main-timeline-container" class="flex-1 overflow-y-auto pr-2 space-y-6 hide-scrollbar"></div>
      </div>
    </div>
  </main>

  <!-- ==================== 编辑抽屉 ==================== -->
  <div id="edit-drawer" class="fixed inset-0 bg-slate-900/40 z-40 flex flex-col justify-end transition-transform translate-y-full duration-300">
    <div class="bg-white w-full h-[95vh] rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] flex flex-col">
      
      <!-- 抽屉头部 -->
      <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-3xl shrink-0">
        <div class="flex items-center space-x-4">
          <h3 id="drawer-title" class="text-xl font-bold text-brand-600">编辑排班与诊室</h3>
          <span class="px-3 py-1 bg-white border border-slate-200 rounded-full text-xs text-slate-500 shadow-sm">1:3 黄金比例布局</span>
        </div>
        <button onclick="closeEditDrawer()" class="px-6 py-2 bg-slate-800 text-white rounded-lg hover:bg-slate-700 transition-colors text-sm font-medium shadow-sm">完成编辑</button>
      </div>
      
      <!-- 抽屉主体：1:3 布局 -->
      <div class="flex-1 flex overflow-hidden">
        
        <!-- 左侧：人员调度 (占据 1/4 = 25%) -->
        <div class="w-1/4 border-r border-slate-100 bg-slate-50/50 p-5 flex flex-col overflow-hidden">
          <div class="flex justify-between items-center mb-3 shrink-0">
            <h4 class="font-bold text-slate-700 flex items-center"><i class="fa-solid fa-users-gear text-brand-500 mr-2"></i>人员调度</h4>
          </div>
          
          <!-- 角色筛选器 (RadioButton 风格) -->
          <div class="flex bg-slate-200/60 p-1 rounded-lg mb-4 shrink-0" id="role-filter-container">
            <button onclick="setFilter('all')" class="flex-1 py-1.5 text-xs rounded-md bg-white shadow-sm font-bold text-slate-700 transition-all filter-btn" data-role="all">全部</button>
            <button onclick="setFilter('doctor')" class="flex-1 py-1.5 text-xs rounded-md text-slate-500 hover:text-slate-700 transition-all filter-btn" data-role="doctor">医生</button>
            <button onclick="setFilter('optometrist')" class="flex-1 py-1.5 text-xs rounded-md text-slate-500 hover:text-slate-700 transition-all filter-btn" data-role="optometrist">视光师</button>
            <button onclick="setFilter('other')" class="flex-1 py-1.5 text-xs rounded-md text-slate-500 hover:text-slate-700 transition-all filter-btn" data-role="other">其他</button>
          </div>

          <!-- 人员列表 -->
          <div id="drawer-staff-list" class="flex-1 overflow-y-auto hide-scrollbar space-y-3 pr-1 pb-4">
            <!-- 动态渲染 -->
          </div>
        </div>

        <!-- 右侧：号源微调 (占据 3/4 = 75%) -->
        <div class="w-3/4 bg-white p-6 flex flex-col overflow-hidden">
          <div class="flex justify-between items-center mb-4 shrink-0">
            <h4 class="font-bold text-slate-700 flex items-center"><i class="fa-solid fa-pen-ruler text-brand-500 mr-2"></i>容量微调</h4>
            <p class="text-[10px] text-slate-500 bg-slate-100 px-2 py-1 rounded"><i class="fa-solid fa-circle-info text-brand-500 mr-1"></i>点击时间块临时修改接诊人数</p>
          </div>
          <div id="drawer-timeline-container" class="flex-1 overflow-y-auto pr-2 space-y-6 hide-scrollbar"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 容量修改小弹窗 -->
  <div id="capacity-popover" class="hidden fixed z-50 bg-white border border-slate-200 rounded-xl shadow-xl p-4 w-64 fade-in">
    <h5 class="font-bold text-slate-700 mb-2 text-sm">修改接诊容量</h5>
    <p id="cap-pop-info" class="text-xs text-slate-500 mb-4"></p>
    <div class="flex items-center space-x-3 mb-4">
      <button onclick="adjustCap(-1)" class="w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold">-</button>
      <input type="number" id="cap-pop-input" class="w-16 text-center border border-slate-200 rounded-lg py-1 font-bold text-brand-600 focus:outline-none" min="0" max="10">
      <button onclick="adjustCap(1)" class="w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold">+</button>
    </div>
    <div class="flex space-x-2">
      <button onclick="closeCapPopover()" class="flex-1 py-1.5 border border-slate-200 rounded-lg text-xs text-slate-600 hover:bg-slate-50">取消</button>
      <button onclick="saveCapPopover()" class="flex-1 py-1.5 bg-brand-500 text-white rounded-lg text-xs font-bold hover:bg-brand-600">确认</button>
    </div>
  </div>

  <script>
    // --- 1. 数据模型 ---
    const ROOMS = [
      { id: 'r1', name: '诊室 101' }, { id: 'r2', name: '诊室 102' },
      { id: 'r3', name: '验光室 1' }, { id: 'r4', name: '验光室 2' }, { id: 'r5', name: '训练室' }
    ];

    const STAFF = [
      { id: 'd1', name: '李主任', role: 'doctor', roleName: '医生', defaultCap: 1, color: 'bg-blue-500' },
      { id: 'd2', name: '王医生', role: 'doctor', roleName: '医生', defaultCap: 3, color: 'bg-blue-500' },
      { id: 'o1', name: '张视光', role: 'optometrist', roleName: '视光师', defaultCap: 2, color: 'bg-brand-500' },
      { id: 'o2', name: '赵视光', role: 'optometrist', roleName: '视光师', defaultCap: 2, color: 'bg-brand-500' },
      { id: 't1', name: '王视训', role: 'trainer', roleName: '视训师', defaultCap: 0, color: 'bg-teal-500' },
      { id: 'r1', name: '赵前台', role: 'receptionist', roleName: '前台', defaultCap: 0, color: 'bg-amber-500' }
    ];

    let SETTINGS = { amStart: '08:00', amEnd: '12:00', pmStart: '13:00', pmEnd: '17:00', duration: 30 };
    let SCHEDULE = {};
    let DATES = [];
    let currentSelectedDate = null;
    let currentEditingSlot = null;
    let currentRoleFilter = 'all'; // 当前筛选状态

    // --- 2. 初始化 ---
    function init() {
      const today = new Date();
      const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      for (let i = 0; i < 14; i++) {
        let d = new Date(today); d.setDate(today.getDate() + i);
        let idStr = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
        DATES.push({ id: idStr, shortLabel: `${d.getMonth() + 1}.${d.getDate()}`, fullLabel: `${d.getMonth() + 1}月${d.getDate()}日`, day: i === 0 ? '今天' : days[d.getDay()] });
        SCHEDULE[idStr] = { am: [], pm: [], rooms: { am: {}, pm: {} }, slots: {} };
      }

      // 模拟数据
      const todayId = DATES[0].id;
      toggleStaffShift(todayId, 'd1', 'am', true); setStaffRoom(todayId, 'd1', 'am', 'r1');
      toggleStaffShift(todayId, 'o1', 'am', true); setStaffRoom(todayId, 'o1', 'am', 'r3');
      toggleStaffShift(todayId, 'd1', 'pm', true); setStaffRoom(todayId, 'd1', 'pm', 'r1');
      toggleStaffShift(todayId, 'r1', 'am', true); // 前台不分配诊室

      selectDate(DATES[0].id);
    }

    // --- 3. 核心逻辑 ---
    function timeToMins(t) { const [h, m] = t.split(':').map(Number); return h * 60 + m; }
    function minsToTime(m) { return `${Math.floor(m / 60).toString().padStart(2, '0')}:${(m % 60).toString().padStart(2, '0')}`; }
    
    function toggleStaffShift(dateId, staffId, period, isWorking) {
      const dayData = SCHEDULE[dateId];
      if (isWorking) {
        if (!dayData[period].includes(staffId)) dayData[period].push(staffId);
        // 初始化号源
        const staff = STAFF.find(s => s.id === staffId);
        if (staff.role === 'doctor' || staff.role === 'optometrist') {
          if (!dayData.slots[staffId]) dayData.slots[staffId] = {};
          let curr = timeToMins(period === 'am' ? SETTINGS.amStart : SETTINGS.pmStart);
          let end = timeToMins(period === 'am' ? SETTINGS.amEnd : SETTINGS.pmEnd);
          while (curr < end) {
            let t = minsToTime(curr);
            if (dayData.slots[staffId][t] === undefined) dayData.slots[staffId][t] = staff.defaultCap;
            curr += SETTINGS.duration;
          }
        }
      } else {
        dayData[period] = dayData[period].filter(id => id !== staffId);
        delete dayData.rooms[period][staffId]; // 清除诊室
        // 清理号源
        if (!dayData.am.includes(staffId) && !dayData.pm.includes(staffId)) {
          delete dayData.slots[staffId];
        } else {
          let curr = timeToMins(period === 'am' ? SETTINGS.amStart : SETTINGS.pmStart);
          let end = timeToMins(period === 'am' ? SETTINGS.amEnd : SETTINGS.pmEnd);
          while (curr < end) { delete dayData.slots[staffId][minsToTime(curr)]; curr += SETTINGS.duration; }
        }
      }
    }

    function setStaffRoom(dateId, staffId, period, roomId) {
      if (roomId === '') delete SCHEDULE[dateId].rooms[period][staffId];
      else SCHEDULE[dateId].rooms[period][staffId] = roomId;
    }

    // --- 4. 渲染视图 (主面板) ---
    function selectDate(dateId) {
      currentSelectedDate = dateId;
      document.getElementById('date-strip').innerHTML = DATES.map(d => {
        const isActive = d.id === currentSelectedDate;
        return `<div onclick="selectDate('${d.id}')" class="flex-1 min-w-[70px] py-2 rounded-xl flex flex-col items-center justify-center cursor-pointer transition-all ${isActive ? 'bg-slate-800 text-white shadow-md scale-105' : 'bg-white text-slate-600 border border-slate-200'}"><span class="text-[10px] ${isActive?'text-slate-300':'text-slate-400'}">${d.day}</span><span class="text-sm font-bold">${d.shortLabel}</span></div>`;
      }).join('');
      renderMainView();
    }

    function getRoomBadge(roomId) {
      if (!roomId) return `<span class="px-2 py-0.5 bg-slate-100 text-slate-400 rounded text-[10px] font-bold border border-slate-200">未分配</span>`;
      const room = ROOMS.find(r => r.id === roomId);
      return `<span class="px-2 py-0.5 bg-green-50 text-green-600 rounded text-[10px] font-bold border border-green-200"><i class="fa-solid fa-door-open mr-1"></i>${room.name}</span>`;
    }

    function renderListRow(staffId, period) {
      const staff = STAFF.find(s => s.id === staffId);
      const roomId = SCHEDULE[currentSelectedDate].rooms[period][staffId];
      return `
        <div class="flex items-center justify-between p-2.5 bg-slate-50 border border-slate-100 rounded-xl hover:bg-white transition-colors">
          <div class="flex items-center space-x-3">
            <div class="w-8 h-8 rounded-full ${staff.color} text-white flex items-center justify-center text-xs font-bold shadow-sm">${staff.name.charAt(0)}</div>
            <div>
              <div class="text-sm font-bold text-slate-700">${staff.name}</div>
              <div class="text-[10px] text-slate-400">${staff.roleName}</div>
            </div>
          </div>
          <div>${getRoomBadge(roomId)}</div>
        </div>
      `;
    }

    function renderMainView() {
      const dateObj = DATES.find(d => d.id === currentSelectedDate);
      const dayData = SCHEDULE[currentSelectedDate];
      document.getElementById('main-title').innerText = `${dateObj.fullLabel} 排班详情`;
      document.getElementById('main-status').innerText = (dayData.am.length || dayData.pm.length) ? '已排班' : '未排班';
      document.getElementById('main-status').className = `px-2.5 py-1 rounded text-xs font-bold ${(dayData.am.length||dayData.pm.length)?'bg-green-100 text-green-700':'bg-slate-200 text-slate-500'}`;

      document.getElementById('main-am-list').innerHTML = dayData.am.length ? dayData.am.map(id => renderListRow(id, 'am')).join('') : '<div class="text-center text-sm text-slate-400 py-4">暂未配置</div>';
      document.getElementById('main-pm-list').innerHTML = dayData.pm.length ? dayData.pm.map(id => renderListRow(id, 'pm')).join('') : '<div class="text-center text-sm text-slate-400 py-4">暂未配置</div>';

      renderTimeline('main-timeline-container', false);
    }

    function renderTimeline(containerId, isEdit) {
      const dayData = SCHEDULE[currentSelectedDate];
      const activeIds = Array.from(new Set([...dayData.am, ...dayData.pm])).filter(id => ['doctor','optometrist'].includes(STAFF.find(s=>s.id===id).role));
      if (!activeIds.length) {
        document.getElementById(containerId).innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-400"><p class="text-sm">暂无号源数据</p></div>`;
        return;
      }

      let allTimes = new Set();
      activeIds.forEach(id => Object.keys(dayData.slots[id] || {}).forEach(t => allTimes.add(t)));
      const sortedTimes = Array.from(allTimes).sort((a,b) => timeToMins(a)-timeToMins(b));

      document.getElementById(containerId).innerHTML = activeIds.map(id => {
        const staff = STAFF.find(s => s.id === id);
        const blocks = sortedTimes.map(time => {
          const cap = dayData.slots[id][time];
          if (cap === undefined) return `<div class="w-14 shrink-0"></div>`;
          return `<div ${isEdit ? `onclick="openCapPopover(event,'${id}','${time}',${cap})"` : ''} class="shrink-0 w-16 h-14 rounded-xl border ${cap>0?'bg-brand-50 border-brand-200 text-brand-700':'bg-slate-100 border-slate-200 text-slate-400'} ${isEdit?'cursor-pointer hover:bg-brand-100':''} flex flex-col items-center justify-center"><span class="text-[10px] font-medium">${time}</span><span class="text-sm font-bold">${cap===0?'停诊':cap+'人'}</span></div>`;
        }).join('');
        return `<div class="flex items-center space-x-3 bg-slate-50/50 p-2.5 rounded-2xl border border-slate-100"><div class="w-16 shrink-0 flex flex-col items-center border-r border-slate-200 pr-2"><div class="w-8 h-8 rounded-full ${staff.color} text-white flex items-center justify-center text-sm font-bold mb-1">${staff.name.charAt(0)}</div><span class="text-[10px] font-bold text-slate-700">${staff.name}</span></div><div class="flex-1 flex space-x-2 overflow-x-auto hide-scrollbar">${blocks}</div></div>`;
      }).join('');
    }

    // --- 5. 编辑抽屉 ---
    function openEditDrawer() {
      document.getElementById('drawer-title').innerText = `编辑 ${DATES.find(d=>d.id===currentSelectedDate).fullLabel} 排班`;
      renderEditDrawer();
      document.getElementById('edit-drawer').classList.remove('translate-y-full');
    }
    function closeEditDrawer() { document.getElementById('edit-drawer').classList.add('translate-y-full'); renderMainView(); }

    function setFilter(role) {
      currentRoleFilter = role;
      // 更新按钮样式
      document.querySelectorAll('.filter-btn').forEach(btn => {
        if (btn.dataset.role === role) {
          btn.classList.add('bg-white', 'shadow-sm', 'font-bold', 'text-slate-700');
          btn.classList.remove('text-slate-500', 'hover:text-slate-700');
        } else {
          btn.classList.remove('bg-white', 'shadow-sm', 'font-bold', 'text-slate-700');
          btn.classList.add('text-slate-500', 'hover:text-slate-700');
        }
      });
      renderEditDrawer();
    }

    function renderEditDrawer() {
      const dayData = SCHEDULE[currentSelectedDate];
      const roomOptions = `<option value="">未分配</option>` + ROOMS.map(r => `<option value="${r.id}">${r.name}</option>`).join('');

      // 过滤人员
      const filteredStaff = STAFF.filter(s => {
        if (currentRoleFilter === 'all') return true;
        if (currentRoleFilter === 'doctor') return s.role === 'doctor';
        if (currentRoleFilter === 'optometrist') return s.role === 'optometrist';
        return s.role !== 'doctor' && s.role !== 'optometrist';
      });

      document.getElementById('drawer-staff-list').innerHTML = filteredStaff.map(staff => {
        const inAm = dayData.am.includes(staff.id); const inPm = dayData.pm.includes(staff.id);
        const amRoom = dayData.rooms.am[staff.id] || ''; const pmRoom = dayData.rooms.pm[staff.id] || '';
        
        return `
          <div class="flex items-center justify-between p-3 bg-white border border-slate-200 rounded-xl hover:shadow-md transition-shadow">
            
            <!-- 左侧：头像与信息 -->
            <div class="flex items-center space-x-3 w-[40%]">
              <div class="w-10 h-10 rounded-full ${staff.color} text-white flex items-center justify-center text-sm font-bold shadow-sm shrink-0">${staff.name.charAt(0)}</div>
              <div class="overflow-hidden">
                <div class="text-sm font-bold text-slate-800 truncate">${staff.name}</div>
                <div class="text-[10px] text-slate-400 truncate">${staff.roleName}</div>
              </div>
            </div>
            
            <!-- 右侧：上下午排班与诊室 -->
            <div class="flex-1 flex flex-col space-y-2 pl-3 border-l border-slate-100">
              <!-- 上午 -->
              <div class="flex items-center space-x-2">
                <button onclick="handleToggleClick('${staff.id}', 'am')" class="w-7 h-7 rounded shrink-0 text-xs font-bold transition-colors ${inAm ? 'bg-brand-500 text-white shadow-sm' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}">上</button>
                <select ${!inAm?'disabled':''} onchange="handleRoom('${staff.id}','am',this.value)" class="flex-1 w-full text-xs border border-slate-200 rounded px-1.5 py-1 focus:border-brand-500 outline-none disabled:bg-slate-50 disabled:text-slate-300 disabled:border-slate-100 transition-all">
                  ${roomOptions.replace(`value="${amRoom}"`, `value="${amRoom}" selected`)}
                </select>
              </div>
              <!-- 下午 -->
              <div class="flex items-center space-x-2">
                <button onclick="handleToggleClick('${staff.id}', 'pm')" class="w-7 h-7 rounded shrink-0 text-xs font-bold transition-colors ${inPm ? 'bg-brand-500 text-white shadow-sm' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}">下</button>
                <select ${!inPm?'disabled':''} onchange="handleRoom('${staff.id}','pm',this.value)" class="flex-1 w-full text-xs border border-slate-200 rounded px-1.5 py-1 focus:border-brand-500 outline-none disabled:bg-slate-50 disabled:text-slate-300 disabled:border-slate-100 transition-all">
                  ${roomOptions.replace(`value="${pmRoom}"`, `value="${pmRoom}" selected`)}
                </select>
              </div>
            </div>

          </div>
        `;
      }).join('');
      renderTimeline('drawer-timeline-container', true);
    }

    window.handleToggleClick = (staffId, period) => {
      const isWorking = !SCHEDULE[currentSelectedDate][period].includes(staffId);
      toggleStaffShift(currentSelectedDate, staffId, period, isWorking);
      renderEditDrawer();
    };
    
    window.handleRoom = (id, period, roomId) => { setStaffRoom(currentSelectedDate, id, period, roomId); };

    // --- 6. 容量弹窗 ---
    function openCapPopover(e, id, time, cap) {
      currentEditingSlot = { id, time };
      document.getElementById('cap-pop-info').innerText = `${STAFF.find(s=>s.id===id).name} - ${time}`;
      document.getElementById('cap-pop-input').value = cap;
      const rect = e.currentTarget.getBoundingClientRect();
      const pop = document.getElementById('capacity-popover');
      pop.style.top = `${rect.top - 120}px`; pop.style.left = `${rect.left}px`;
      pop.classList.remove('hidden');
    }
    function closeCapPopover() { document.getElementById('capacity-popover').classList.add('hidden'); }
    function adjustCap(d) { const i = document.getElementById('cap-pop-input'); i.value = Math.max(0, parseInt(i.value)+d); }
    function saveCapPopover() {
      SCHEDULE[currentSelectedDate].slots[currentEditingSlot.id][currentEditingSlot.time] = parseInt(document.getElementById('cap-pop-input').value);
      closeCapPopover(); renderEditDrawer();
    }

    init();
  </script>
</body>
</html>
