<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人员管理 - 惟翎</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 900: '#064e3b' } } } } }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">

  <!-- 顶部导航 -->
  <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0">
    <div class="flex items-center space-x-3">
      <div class="w-9 h-9 bg-brand-50 rounded-lg flex items-center justify-center text-brand-600"><i class="fa-solid fa-users text-lg"></i></div>
      <h1 class="text-xl font-bold text-slate-800">人员管理</h1>
    </div>
    <button onclick="openModal()" class="px-4 py-2 bg-brand-500 text-white rounded-lg hover:bg-brand-600 transition-colors text-sm font-medium shadow-sm flex items-center">
      <i class="fa-solid fa-plus mr-2"></i> 录入人员
    </button>
  </header>

  <!-- 主体内容 -->
  <main class="flex-1 overflow-hidden flex flex-col p-6">
    <!-- 筛选区 -->
    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm mb-4 flex space-x-4 shrink-0">
      <div class="flex-1 max-w-xs relative">
        <i class="fa-solid fa-search absolute left-3 top-2.5 text-slate-400"></i>
        <input type="text" placeholder="搜索姓名/职称..." class="w-full pl-9 pr-4 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-brand-500">
      </div>
      <select class="border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-brand-500 text-slate-600">
        <option value="">全部角色</option>
        <option value="doctor">医生</option>
        <option value="optometrist">视光师</option>
        <option value="trainer">视训师</option>
        <option value="receptionist">前台</option>
        <option value="sales">销售</option>
      </select>
      <select class="border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-brand-500 text-slate-600">
        <option value="active">在职</option>
        <option value="resigned">已离职</option>
      </select>
    </div>

    <!-- 表格区 -->
    <div class="bg-white border border-slate-200 rounded-xl shadow-sm flex-1 overflow-hidden flex flex-col">
      <div class="overflow-y-auto flex-1">
        <table class="w-full text-left border-collapse">
          <thead class="bg-slate-50 sticky top-0 z-10 border-b border-slate-200">
            <tr>
              <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider">人员信息</th>
              <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider">角色 / 职称</th>
              <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider">擅长描述</th>
              <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider">状态 / 时间</th>
              <th class="py-3 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">操作</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100" id="table-body">
            <!-- 动态渲染 -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- 录入/编辑弹窗 -->
  <div id="personnel-modal" class="hidden fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl w-[500px] max-w-full overflow-hidden flex flex-col">
      <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
        <h3 class="text-lg font-bold text-slate-800">录入人员信息</h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>
      <div class="p-6 space-y-4">
        <div class="flex space-x-4">
          <div class="flex-1 space-y-1"><label class="text-xs font-bold text-slate-500">姓名</label><input type="text" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-brand-500 outline-none" value="李主任"></div>
          <div class="w-24 space-y-1"><label class="text-xs font-bold text-slate-500">年龄</label><input type="number" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-brand-500 outline-none" value="45"></div>
        </div>
        <div class="flex space-x-4">
          <div class="flex-1 space-y-1">
            <label class="text-xs font-bold text-slate-500">角色</label>
            <select class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-brand-500 outline-none">
              <option selected>医生</option><option>视光师</option><option>视训师</option>
            </select>
          </div>
          <div class="flex-1 space-y-1"><label class="text-xs font-bold text-slate-500">职称</label><input type="text" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-brand-500 outline-none" value="副主任医师"></div>
        </div>
        <div class="space-y-1"><label class="text-xs font-bold text-slate-500">擅长描述</label><textarea class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-brand-500 outline-none" rows="2">小儿斜弱视、青少年近视防控</textarea></div>
        <div class="flex space-x-4">
          <div class="flex-1 space-y-1"><label class="text-xs font-bold text-slate-500">入职时间</label><input type="date" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-brand-500 outline-none" value="2018-05-12"></div>
          <div class="flex-1 space-y-1">
            <label class="text-xs font-bold text-slate-500">状态</label>
            <select class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-brand-500 outline-none"><option selected>在职</option><option>已离职</option></select>
          </div>
        </div>
      </div>
      <div class="px-6 py-4 border-t border-slate-100 bg-slate-50 flex justify-end space-x-3">
        <button onclick="closeModal()" class="px-4 py-2 border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-100 text-sm">取消</button>
        <button onclick="closeModal()" class="px-4 py-2 bg-brand-500 text-white rounded-lg hover:bg-brand-600 shadow-sm text-sm">保存</button>
      </div>
    </div>
  </div>

  <script>
    const mockData = [
      { name: '李主任', age: 45, role: '医生', title: '副主任医师', desc: '小儿斜弱视、近视防控', status: 'active', joinDate: '2018-05-12', color: 'bg-blue-500' },
      { name: '张视光', age: 28, role: '视光师', title: '高级验光员', desc: '角膜塑形镜验配、双眼视功能异常处理', status: 'active', joinDate: '2021-03-01', color: 'bg-brand-500' },
      { name: '王视训', age: 26, role: '视训师', title: '初级视训师', desc: '弱视训练、调节功能训练', status: 'active', joinDate: '2022-07-15', color: 'bg-teal-500' },
      { name: '赵前台', age: 24, role: '前台', title: '接待专员', desc: '客户接待、分诊引导', status: 'resigned', joinDate: '2020-01-10', resignDate: '2023-09-01', color: 'bg-amber-500' }
    ];

    document.getElementById('table-body').innerHTML = mockData.map(s => `
      <tr class="hover:bg-slate-50 transition-colors group">
        <td class="py-3 px-6">
          <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-full ${s.color} text-white flex items-center justify-center font-bold shadow-sm">${s.name.charAt(0)}</div>
            <div><div class="font-bold text-slate-800 text-sm">${s.name} <span class="text-xs font-normal text-slate-400 ml-1">${s.age}岁</span></div></div>
          </div>
        </td>
        <td class="py-3 px-6"><div class="text-sm font-bold text-slate-700">${s.role}</div><div class="text-xs text-slate-500">${s.title}</div></td>
        <td class="py-3 px-6"><div class="text-sm text-slate-600 max-w-xs truncate" title="${s.desc}">${s.desc}</div></td>
        <td class="py-3 px-6">
          ${s.status === 'active' 
            ? `<span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-bold">在职</span><div class="text-xs text-slate-400 mt-1">入职: ${s.joinDate}</div>` 
            : `<span class="px-2 py-1 bg-slate-200 text-slate-500 rounded text-xs font-bold">已离职</span><div class="text-xs text-slate-400 mt-1">离职: ${s.resignDate}</div>`}
        </td>
        <td class="py-3 px-6 text-right">
          <button class="text-brand-500 hover:text-brand-700 text-sm font-medium mr-3 opacity-0 group-hover:opacity-100 transition-opacity">编辑</button>
        </td>
      </tr>
    `).join('');

    function openModal() { document.getElementById('personnel-modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('personnel-modal').classList.add('hidden'); }
  </script>
</body>
</html>
